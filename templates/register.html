{% extends "base.html" %}
{% block content %}
<div class="auth-card">
    <h2>Create Account</h2>
    <form method="POST">
        <label>Username</label>
        <input type="text" name="username" placeholder="Use 'Admin' for privileges" required>
        <label>Email</label>
        <input type="email" name="email" required>
        <label>Password</label>
        <input type="password" name="password" required>
        <button type="submit" class="btn-success">Sign Up</button>
    </form>
    <p>Already registered? <a href="{{ url_for('login') }}">Login here</a></p>
</div>
{% endblock %}
